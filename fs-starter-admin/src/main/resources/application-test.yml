# 测试环境：MySQL / Redis / MinIO 同机部署，改 IP 只需改 fs.infra.host
fs:
  infra:
    host: 127.0.0.1

spring:
  datasource:
    url: jdbc:mysql://${fs.infra.host}:3306/fs_starter_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${fs.infra.host}
      port: 6379
      password:
      database: 0

minio:
  endpoint: http://${fs.infra.host}:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: fs-starter
  base-url: http://${fs.infra.host}:9000/fs-starter
