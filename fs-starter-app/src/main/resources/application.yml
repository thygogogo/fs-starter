server:
  port: 8888
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  application:
    name: fs-starter-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}

wechat:
  mock: true
  appid: wxYOUR_APPID_HERE
  secret: YOUR_SECRET_HERE

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fs.starter.domain.entity
  type-enums-package: com.fs.starter.domain.enums
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
