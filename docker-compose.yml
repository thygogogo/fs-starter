services:
  mysql:
    image: mysql:8.0
    container_name: fs-starter-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fs_starter_db
    ports:
      - '3306:3306'
    volumes:
      - fs_starter_mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci

  redis:
    image: redis:7-alpine
    container_name: fs-starter-redis
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: fs-starter-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - fs_starter_minio:/data

volumes:
  fs_starter_mysql:
  fs_starter_minio:
